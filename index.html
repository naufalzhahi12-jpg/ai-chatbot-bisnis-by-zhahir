<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"

>

<title>
AI Customer Assistant
</title>

<link
rel="stylesheet"
href="style.css"
>

</head>

<body>

<div class="container">

<button
class="mode"
onclick="toggleMode()"

>

🌙 </button>

<div class="header">

<img
src="./assets/logo.png"
class="logo"

>

<h1>
AI Customer Assistant
</h1>

<p class="desc">
Chat otomatis untuk pelanggan
</p>

</div>

<div class="quick">

<div
class="card"
onclick="quick('harga')"
>
💰
<br>
Harga
</div>

<div
class="card"
onclick="quick('lokasi')"
>
📍
<br>
Lokasi
</div>

<div
class="card"
onclick="quick('kontak')"
>
📞
<br>
Kontak
</div>

<div
class="card"
onclick="quick('promo')"
>
🔥
<br>
Promo
</div>

</div>

<div class="input-area">

<input
id="msg"
placeholder="Tulis pertanyaan..."

>

<button
class="send"
onclick="send()"

>

Kirim </button>

<button
class="clear"
onclick="clearChat()"

>

Hapus </button>

</div>

<div id="chat"></div>

<div class="stats">

📊 Top Pertanyaan

<div id="stats">

Belum ada data

</div>

</div>

<div class="footer">

Chat: <span id="counter">
0 </span>

|

Made by Zhahir 🚀

</div>

</div>

<script
src="./script.js"
></script>

</body>

</html>
