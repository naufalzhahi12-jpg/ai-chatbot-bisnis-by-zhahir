<h1>🤖 AI Customer Assistant</h1>

<p>
Chat otomatis untuk menjawab pertanyaan pelanggan
</p>

<input
id="msg"
placeholder="Tulis pesan..."
>

<button onclick="send()">
Kirim
</button>

<button onclick="clearChat()">
Hapus Chat
</button>

<div id="chat"></div>

<script>

const data=[

{
keyword:["halo","hai"],
jawaban:"👋 Halo!"
},

{
keyword:["harga","berapa"],
jawaban:"💰 Paket mulai Rp50.000"
},

{
keyword:["jam","buka"],
jawaban:"🕒 08.00–17.00"
},

{
keyword:["bayar","qris"],
jawaban:"💳 Transfer / QRIS"
}

];

function send(){

let input=
document.getElementById(
"msg"
);

let pesan=
input.value
.toLowerCase()
.trim();

if(!pesan)
return;

let hasil=[];

for(
let item
of
data
){

if(

item.keyword.some(

k=>

pesan.includes(k)

)

){

hasil.push(
item.jawaban
);

}

}

let balasan=

hasil.length

?

hasil.join("<br>")

:

"🤖 Maaf saya belum memahami pertanyaan.";

let chat=
document.getElementById(
"chat"
);

chat.innerHTML+=

`
<div class="user">
👤 ${pesan}
</div>

<div class="bot">
${balasan}
</div>
`;

input.value="";

}

function clearChat(){

document
.getElementById(
"chat"
).innerHTML=
"";

}

document
.getElementById(
"msg"
)
.addEventListener(
"keypress",
function(e){

if(
e.key==="Enter"
){

send();

}

}
);

</script>

<hr>

<p>
Made by Zhahir 🚀
</p>

</body>
