<!DOCTYPE html>
<html>

<head>

<title>AI Chatbot</title>

<style>

body{
background:#f4f7fb;
font-family:Arial;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:
0 10px 30px
rgba(
0,
0,
0,
0.08
);
}

h1{
text-align:center;
}

.desc{
text-align:center;
color:#777;
}

.input-area{
display:flex;
gap:10px;
margin-top:20px;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:12px;
background:#f2f2f2;
font-size:16px;
}

button{
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
}

.send{
background:#2563eb;
color:white;
}

.clear{
background:#ef4444;
color:white;
}

#chat{
margin-top:20px;
display:flex;
flex-direction:column;
gap:12px;
height:450px;
overflow-y:auto;
}

.user{

align-self:flex-end;

background:#2563eb;

color:white;

padding:12px;

border-radius:
20px
20px
5px
20px;

max-width:75%;

animation:
fade .3s;

}

.bot{

align-self:flex-start;

background:#ececec;

padding:12px;

border-radius:
20px
20px
20px
5px;

max-width:75%;

animation:
fade .3s;

}

.footer{

margin-top:20px;

text-align:center;

color:#888;

}

.typing{

opacity:.7;

font-style:italic;

}

@keyframes fade{

from{

opacity:0;

transform:
translateY(
10px
);

}

to{

opacity:1;

transform:
translateY(
0
);

}

}

</style>

</head>

<body>

<div class="container">

<h1>
🤖 AI Customer Assistant
</h1>

<p class="desc">
Chat otomatis untuk pelanggan
</p>

<div class="input-area">

<input
id="msg"
placeholder="Tulis pertanyaan..."
>

<button
class="send"
onclick="send()"
>
Kirim
</button>

<button
class="clear"
onclick="clearChat()"
>
Hapus
</button>

</div>

<div id="chat"></div>

<div class="footer">
Made by Zhahir 🚀
</div>

</div>

<script>

const data=[

{
keyword:["halo","hai"],
jawaban:"👋 Halo! Ada yang bisa saya bantu?"
},

{
keyword:["harga","berapa"],
jawaban:"💰 Paket mulai Rp50.000"
},

{
keyword:["jam","buka"],
jawaban:"🕒 Kami buka 08.00–17.00"
},

{
keyword:["bayar","qris"],
jawaban:"💳 Transfer / QRIS"
},

{
keyword:["alamat","lokasi"],
jawaban:"📍 Yogyakarta"
}

];

window.onload=
function(){

document
.getElementById(
"chat"
).innerHTML=

localStorage
.getItem(
"chat"
)

||

"";

};

function send(){

let input=
document
.getElementById(
"msg"
);

let pesan=
input
.value
.trim()
.toLowerCase();

if(
!pesan
)
return;

let chat=
document
.getElementById(
"chat"
);

chat.innerHTML+=

`
<div class="user">
👤 ${pesan}
</div>

<div
id="typing"
class="bot typing"
>
🤖 Mengetik...
</div>
`;

chat.scrollTop=
chat.scrollHeight;

input.value="";

setTimeout(

function(){

document
.getElementById(
"typing"
)
.remove();

let hasil=[];

for(
let item
of
data
){

if(

item.keyword.some(

k=>

pesan.includes(k)

)

){

hasil.push(
item.jawaban
);

}

}

let balasan=

hasil.length

?

hasil.join("<br>")

:

"🤖 Maaf saya belum memahami pertanyaan.";

chat.innerHTML+=

`
<div class="bot">
${balasan}
</div>
`;

localStorage
.setItem(
"chat",
chat.innerHTML
);

chat.scrollTop=
chat.scrollHeight;

},

700

);

localStorage
.setItem(
"chat",
chat.innerHTML
);

}

function clearChat(){

document
.getElementById(
"chat"
).innerHTML=
"";

localStorage
.removeItem(
"chat"
);

}

document
.getElementById(
"msg"
)
.addEventListener(

"keypress",

function(e){

if(
e.key==="Enter"
){

send();

}

}

);

</script>

</body>

</html>
