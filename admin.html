<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<link
rel="stylesheet"
href="./style.css"
>

</head>

<body>

<div class="container">

<h1>⚙ Admin Panel</h1>

<p>Tambah FAQ chatbot</p>

<input
id="keyword"
placeholder="keyword (pisahkan dengan koma)"
>

<br><br>

<textarea
id="jawaban"
placeholder="jawaban"
style="
width:100%;
height:120px;
padding:15px;
border-radius:10px;
"
></textarea>

<br><br>

<button
class="send"
onclick="simpan()"
>
💾 Simpan
<button
class="send"
onclick="exportJSON()"
>

📤 Export JSON

</button>
</button>
<br><br>

<h3>
📚 Daftar FAQ
</h3>
<button
class="clear"
onclick="resetAll()"
>
🗑 Reset
</button>

<div
id="list"
style="margin-top:20px"
></div>

</div>

<script
src="./admin.js"
></script>

</body>

</html>
